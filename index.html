          try {
            const token = typeof window !== 'undefined' ? window.__initial_auth_token : undefined;
            if (token) {
              await auth.signInWithCustomToken(token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Autentikasi gagal:", error);
          }
        };
        initAuth();
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      // Ambil Data Rapor secara Real-time dari Penyimpanan jika ada
      useEffect(() => {
        if (!user || !db) return;

        const studentsCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
        
        const unsubscribe = studentsCol.onSnapshot((snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });
          });

          if (list.length === 0) {
            // Seed otomatis template contoh jika database kosong
            initialStudents.forEach((s) => {
              studentsCol.doc(s.id).set(s);
            });
          } else {
            // Urutkan data secara internal di memori browser
            list.sort((a, b) => {
              const numA = parseInt(a.nis.replace(/\D/g, '')) || 0;
              const numB = parseInt(b.nis.replace(/\D/g, '')) || 0;
              return numA - numB;
            });
            setStudents(list);
          }
        }, (error) => {
          console.error("Gagal membaca database:", error);
        });

        return () => unsubscribe();
      }, [user]);

      // Ambil Pengaturan Identitas Dokumen secara Real-time
      useEffect(() => {
        if (!user || !db) return;

        const settingsDoc = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('global');
        
        const unsubscribe = settingsDoc.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            if (data.semester) setGlobalSemester(data.semester);
            if (data.tanggal) setGlobalTanggal(data.tanggal);
            if (data.waliKelas) setGlobalWaliKelas(data.waliKelas);
            if (data.jabatanKS) setGlobalJabatanKS(data.jabatanKS);
            if (data.namaKS) setGlobalNamaKS(data.namaKS);
          } else {
            settingsDoc.set({

        try {

      };

      const triggerConfirm = (message, onConfirm, title = "Konfirmasi Tindakan") => {
        setAlertConfig({ type: 'confirm', title, message, onConfirm });
      };

      // Navigasi santri sebelumnya/berikutnya
      const handlePrev = () => {
        if (students.length === 0) return;
        if (currentIndex > 0) {
          setSelectedStudentId(students[currentIndex - 1].id);
        } else {
          setSelectedStudentId(students[students.length - 1].id);
        }
      };

      const handleNext = () => {
        if (students.length === 0) return;
        if (currentIndex < students.length - 1) {
          setSelectedStudentId(students[currentIndex + 1].id);
        } else {
          setSelectedStudentId(students[0].id);
        }
      };

      // Menyimpan data santri langsung ke dalam database awan permanen
      const handleSaveStudent = async (studentData) => {
        const studentId = isAddingNew ? Date.now().toString() : studentData.id;
        const updatedPayload = {
          ...studentData,
          id: studentId,
          sas: Number(studentData.sas) || 85,
          sat: Number(studentData.sat) || 88,
          tahfizh_juz: Number(studentData.tahfizh_juz) || 0,
          wali_kamar: studentData.wali_kamar || "Sayyidah Raisya Apalah (Arti Menunggu)"
        };

        if (user && db) {
          try {
            const studentDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(studentId);
            await studentDocRef.set(updatedPayload);
            
            setSelectedStudentId(studentId);
            setEditingStudent(null);
            setIsAddingNew(false);
            triggerAlert(`Data rapor ananda ${studentData.nama} berhasil disimpan!`, "Sukses Menyimpan");
          } catch (err) {
            console.error("Gagal simpan database:", err);
            triggerAlert("Gagal menyimpan data ke penyimpanan sistem.", "Eror");
          }
        } else {
          // Fallback memori lokal jika koneksi terputus sementara
          if (isAddingNew) {
            setStudents([...students, updatedPayload]);
            setSelectedStudentId(studentId);
          } else {
            setStudents(students.map(s => s.id === studentData.id ? updatedPayload : s));
          }
          setEditingStudent(null);
          setIsAddingNew(false);
          triggerAlert(`Data rapor ananda ${studentData.nama} berhasil disimpan!`, "Sukses Menyimpan");
        }
      };

      // Menghapus data santri secara permanen
      const handleDeleteStudent = (id, name) => {
        triggerConfirm(`Apakah Anda yakin ingin menghapus data santri "${name}" secara permanen?`, async () => {
          if (user && db) {
            try {
              const studentDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(id);
              await studentDocRef.delete();
              triggerAlert("Data santri berhasil dihapus secara permanen.", "Sukses Terhapus");
              
              if (students.length > 1) {
                const nextValid = students.find(s => s.id !== id);
                if (nextValid) setSelectedStudentId(nextValid.id);
              }
            } catch (err) {
              console.error("Gagal menghapus:", err);
              triggerAlert("Gagal menghapus data dari penyimpanan.", "Eror");
            }
          } else {
            const updated = students.filter(s => s.id !== id);
            setStudents(updated);
            triggerAlert("Data santri berhasil dihapus.", "Sukses Terhapus");
            
            if (updated.length > 0) {
              if (String(selectedStudentId) === String(id)) {
                setSelectedStudentId(updated[0].id);
              }
            } else {
              setSelectedStudentId("");
            }
          }
        });
      };

      // Download Data Excel / CSV dengan 12 kolom presisi (Termasuk pemisahan "Jumlah Juz" dan "Tahfizh Al-Qur'an")
      const handleDownloadExcel = () => {
        if (students.length === 0) {
          triggerAlert("Tidak ada data siswa untuk diunduh.", "Data Kosong");
          return;
        }

        const headers = [
          "Nama Santri", 
          "NIS / Kelas", 
          "Nilai SAS (Ganjil)",
          "Nilai SAT (Genap)",
          "Hasil Psikotes Awal",
          "Mata Pelajaran Unggul",
          "Mata Pelajaran Perlu Bimbingan",
          "Progress 1 Tahun", 
          "Jumlah Juz",                      // Kolom Baru khusus Jumlah Juz
          "Tahfizh Al-Qur'an",                // Kolom Detail hafalan
          "Ibadah Harian", 
          "Sikap & Disiplin", 
          "Kepemimpinan & Sosial", 
          "Prestasi Non-Akademik", 
          "Fokus Peningkatan & Target Tahun Selanjutnya", 
          "Pesan Wali Kelas & Wali Kamar",
          "Nama Wali Kamar"
        ];

        const rows = students.map(s => [
          s.nama || "", 
          s.nis || "", 
          s.sas || "",
          s.sat || "",
          s.psikotes || "",
          s.mapel_unggul || "",
          s.mapel_perlu || "",
          s.progres_1s || "", 
          s.tahfizh_juz !== undefined ? s.tahfizh_juz : 0, 
          s.tahfizh_detail || "", 
          s.ibadah || "", 
          s.disiplin || "", 
          s.sosial || "", 
          s.prestasi || "", 
          s.fokus || "", 
          s.pesan_wali || "",
          s.wali_kamar || "Sayyidah Raisya Apalah (Arti Menunggu)"
        ]);

        const escapeCSV = (val) => {
          if (val === undefined || val === null) return '';
          let str = String(val).replace(/"/g, '""');
          if (str.includes(',') || str.includes('\n') || str.includes('\r') || str.includes('"') || str.includes(';')) {
            return `"${str}"`;
          }
          return str;
        };

        const csvContent = "\uFEFF" + [
          headers.join(";"),
          ...rows.map(r => r.map(escapeCSV).join(";"))
        ].join("\n");

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `database_rapor_malika_${globalSemester.replace(/[\/\s]/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // Template Generator dengan 12 Kolom yang mendukung pemisahan Jumlah Juz secara eksplisit
      const getTemplateTSV = () => {
        const headers = "Nama Santri\tNIS / Kelas\tNilai SAS (Ganjil)\tNilai SAT (Genap)\tHasil Psikotes Awal\tMata Pelajaran Unggul\tMata Pelajaran Perlu Bimbingan\tProgress 1 Tahun\tJumlah Juz\tTahfizh Al-Qur'an\tIbadah Harian\tSikap & Disiplin\tKepemimpinan & Sosial\tPrestasi Non-Akademik\tFokus Peningkatan & Target Tahun Selanjutnya\tPesan Wali Kelas & Wali Kamar\tNama Wali Kamar";
        const dummyRow = "Ria Ricis\tNIS-001/7 A\t88\t94\tMenunjukkan tingkat penyesuaian sosial yang luar biasa tinggi.\tBahasa Arab, Seni Budaya\tMatematika\tMengalami lompatan pemahaman kognitif yang sangat baik, sangat vokal dan antusias dalam berdiskusi kelompok, serta konsisten menyerahkan tugas tepat waktu.\t5\tLancar Juz 30, 29, 28, Surah Al-Kahfi, dan Yasin\tSangat istiqamah dalam shalat berjamaah lima waktu di mushola putri asrama, rajin mengamalkan puasa sunnah Senin-Kamis.\tSelalu mematuhi peraturan pondok dengan gembira, merapikan kasur and lemari secara mandiri.\tMemiliki jiwa kepemimpinan (leadership) alamiah yang menonjol, sangat mudah bergaul, gemar menolong teman.\tJuara 1 Lomba Pidato Dakwah Keagamaan (Muhadharah) tingkat Pondok Pesantren.\tMeningkatkan ketelitian dalam menyelesaikan soal hitungan Matematika dan lebih tenang serta tartil ketika menyetor hafalan baru.\tMasya Allah, ananda Ria adalah santri yang penuh energi positif. Teruslah konsisten menjaga ibadah.\tSayyidah Raisya Apalah (Arti Menunggu)";
        
        setBulkImportText(`${headers}\n${dummyRow}`);
        triggerAlert("Template berhasil dimuat di kolom teks di bawah! Anda bisa menyalinnya ke Excel/Sheets untuk diisi, lalu klik 'Proses & Upload'.", "Template Berhasil Dimuat");
      };

      // Membaca file yang diupload pengguna
      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          setBulkImportText(text);
          triggerAlert("File berhasil dibaca! Silakan tinjau teks di bawah dan klik 'Proses & Upload' untuk menyimpannya.", "File Terbaca");
        };
        reader.readAsText(file);
      };

      // Fungsi Pembaca Baris CSV/TSV Tingkat Lanjut
      const parseCSVRow = (text, delim) => {
        let result = [];
        let start = 0;
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          if (text[i] === '"') {
            inQuotes = !inQuotes;
          } else if (text[i] === delim && !inQuotes) {
            let value = text.substring(start, i).trim();
            if (value.startsWith('"') && value.endsWith('"')) {
              value = value.substring(1, value.length - 1).replace(/""/g, '"');
            }
            result.push(value);
            start = i + 1;
          }
        }
        let value = text.substring(start).trim();
        if (value.startsWith('"') && value.endsWith('"')) {
          value = value.substring(1, value.length - 1).replace(/""/g, '"');
        }
        result.push(value);
        return result;
      };

      // Proses Impor Data TSV/CSV yang diupload langsung ke State Lokal
      const handleImportTSV = async () => {
        try {
          const lines = bulkImportText.trim().split("\n");
          if (lines.length < 2) {
            triggerAlert("Mohon masukkan data berformat spreadsheet (minimal terdapat baris tajuk dan satu baris data).", "Gagal Upload");
            return;
          }
          
          let delimiter = "\t";
          if (lines[0].includes(";")) delimiter = ";";
          else if (lines[0].includes(",") && !lines[0].includes("\t")) delimiter = ",";

          const headers = lines[0].split(delimiter).map(h => h.trim().replace(/^["']|["']$/g, '').toLowerCase());
          const newStudentsList = [];

          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            let cols = [];
            if (delimiter === "," || delimiter === ";") {
              cols = parseCSVRow(lines[i], delimiter);
            } else {
              cols = lines[i].split(delimiter).map(c => c.trim().replace(/^["']|["']$/g, ''));
            }

            const rowObj = {};
            
            headers.forEach((header, index) => {
              let key = null;
              const h = header.trim().toLowerCase();
              if (h.includes("nama santri") || h.includes("nama lengkap") || h === "nama") {
                key = "nama";
              } else if (h.includes("pesan") || h.includes("rekomendasi")) {
                key = "pesan_wali";
              } else if (h.includes("nama wali kamar") || h.includes("wali_kamar") || (h.includes("wali kamar") && !h.includes("pesan"))) {
                key = "wali_kamar";
              } else if (h.includes("nis") || h.includes("kelas")) {
                key = "nis";
              } else if (h.includes("perkembangan") || h.includes("progres") || h.includes("progress") || h.includes("tahun")) {
                if (h.includes("progress") || h.includes("progres")) {
                  key = "progres_1s";
                } else if (h.includes("fokus") || h.includes("target")) {
                  key = "fokus";
                }
              } else if (h.includes("jumlah juz") || h === "juz" || h === "jumlah_juz" || (h.includes("juz") && h.includes("jumlah"))) {
                key = "tahfizh_juz";
              } else if (h.includes("tahfizh") || h.includes("qur'an") || h.includes("quran") || h.includes("detail")) {
                key = "tahfizh_detail";
              } else if (h.includes("ibadah")) {
                key = "ibadah";
              } else if (h.includes("sikap") || h.includes("disiplin")) {
                key = "disiplin";
              } else if (h.includes("kepemimpinan") || h.includes("sosial")) {
                key = "sosial";
              } else if (h.includes("prestasi")) {
                key = "prestasi";
              } else if (h.includes("fokus") || h.includes("target") || h.includes("selanjutnya")) {
                key = "fokus";
              } else if (h.includes("sas") || h.includes("ganjil")) {
                key = "sas";
              } else if (h.includes("sat") || h.includes("genap")) {
                key = "sat";
              } else if (h.includes("psikotes") || h.includes("awal")) {
                key = "psikotes";
              } else if (h.includes("unggul")) {
                key = "mapel_unggul";
              } else if (h.includes("bimbingan") || h.includes("perlu")) {
                key = "mapel_perlu";
              }

              if (key) {
                rowObj[key] = cols[index] || "";
              }
            });

            // --- SISTEM DETEKSI DUPLIKASI PINTAR ---
            const studentNamaNorm = rowObj.nama ? rowObj.nama.trim().toLowerCase() : "";
            const studentNisNorm = rowObj.nis ? rowObj.nis.trim().toLowerCase() : "";
            
            // Cari apakah santri ini sudah ada di state lokal/awan
            const existingStudent = students.find(s => 
              (s.nama && studentNamaNorm && s.nama.trim().toLowerCase() === studentNamaNorm) ||
              (s.nis && studentNisNorm && s.nis.trim().toLowerCase() === studentNisNorm)
            );

            // Gunakan ID lama jika ada, atau buat baru jika santri benar-benar baru
            const studentId = existingStudent ? existingStudent.id : (Date.now() + i).toString();
            rowObj.id = studentId;

            // --- SISTEM DETEKSI OTOMATIS & FALLBACK JUMLAH JUZ ---
            let extractedJuz = 0;
            
            // 1. Jika kolom 'Jumlah Juz' terdeteksi secara eksplisit, gunakan nilainya
            if (rowObj.tahfizh_juz !== undefined && rowObj.tahfizh_juz !== "") {
              extractedJuz = parseInt(String(rowObj.tahfizh_juz).replace(/\D/g, '')) || 0;
            } else if (rowObj.tahfizh_detail) {
              // 2. Jika tidak ada kolom 'Jumlah Juz', tapi ada detail teks (misal: "5 Juz (Lancar Juz 30...)"), gunakan regex multi-layer
              const startJuzMatch = String(rowObj.tahfizh_detail).match(/^(\d+)\s*juz/i);
              const anyJuzMatch = String(rowObj.tahfizh_detail).match(/(\d+)\s*juz/i);
              const generalMatch = String(rowObj.tahfizh_detail).match(/\d+/);
              
              if (startJuzMatch) {
                extractedJuz = parseInt(startJuzMatch[1]);
              } else if (anyJuzMatch) {
                extractedJuz = parseInt(anyJuzMatch[1]);
              } else if (generalMatch) {
                extractedJuz = parseInt(generalMatch[0]);
              }
            }
            rowObj.tahfizh_juz = extractedJuz;

            rowObj.nama = rowObj.nama || "Santri Baru " + i;
            rowObj.nis = rowObj.nis || "NIS-xxx";
            rowObj.sas = Number(rowObj.sas) || 85;
            rowObj.sat = Number(rowObj.sat) || 88;
            rowObj.psikotes = rowObj.psikotes || "Menunjukkan stabilitas kognitif and adaptasi sosial yang baik di lingkungan pondok.";
            rowObj.mapel_unggul = rowObj.mapel_unggul || "Bahasa Arab, Fiqih";
            rowObj.mapel_perlu = rowObj.mapel_perlu || "Matematika";
            rowObj.wali_kamar = rowObj.wali_kamar || "Sayyidah Raisya Apalah (Arti Menunggu)";

            newStudentsList.push(rowObj);
          }

          if (user && db) {
            // Unggah permanen ke database awan
            for (const s of newStudentsList) {
              await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(s.id).set(s);
            }
          } else {
            // Update lokal state jika dalam mode luring
            let updatedStudents = [...students];
            newStudentsList.forEach(newS => {
              const existingIdx = updatedStudents.findIndex(s => s.id === newS.id);
              if (existingIdx > -1) {
                updatedStudents[existingIdx] = newS;
              } else {
                updatedStudents.push(newS);
              }
            });
            setStudents(updatedStudents);
          }

          // Otomatis ubah tampilan rapor aktif ke santri pertama hasil impor
          if (newStudentsList.length > 0) {
            setSelectedStudentId(newStudentsList[0].id);
          }

          setShowImportModal(false);
          setBulkImportText("");
          triggerAlert(`Berhasil mengunggah ${newStudentsList.length} data santri! Keterangan Jumlah Juz telah diperbarui secara otomatis.`, "Upload Sukses");
        } catch (err) {
          console.error("Gagal upload:", err);
          triggerAlert("Gagal memproses data unggahan. Pastikan format file atau salinan tabel benar.", "Kesalahan");
        }
      };

      const handlePrint = () => { window.print(); };

      // Kalkulasi peningkatan nilai rata-rata
      const calculateChange = (student) => {
        if (!student || !student.sas) return { percent: "0", positive: true };
        const diff = student.sat - student.sas;
        const percent = ((diff / student.sas) * 100).toFixed(1);
        return { percent: Math.abs(percent), positive: diff >= 0 };
      };

      const progress = selectedStudent ? calculateChange(selectedStudent) : { percent: "0", positive: true };

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col font-sans text-slate-800">
          
          {/* Header Lebih Rapi & Minimalis */}
          <header className="bg-gradient-to-r from-[#1e293b] to-[#0f172a] text-white shadow-lg print:hidden border-b border-slate-800">
            <div className="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-white flex items-center justify-center p-1.5 shadow-md overflow-hidden">
                  <img src="https://iili.io/FsLlXA7.png" alt="Logo Malika" className="w-full h-full object-contain" />
                </div>
                <div>
                  <h1 className="text-base font-extrabold tracking-wide uppercase leading-none text-slate-100">MALIKA ISLAMIC BOARDING SCHOOL</h1>
                  <p className="text-[10px] text-indigo-300 font-semibold mt-1">Sistem Rapor Holistik Perkembangan Santri</p>
                </div>
              </div>
              <div className="px-3 py-1 bg-slate-800/80 rounded-full text-[10px] font-bold flex items-center gap-2 border border-slate-700/60 shadow-inner">
                <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
                <span className="text-emerald-400">Penyimpanan Otomatis Aktif</span>
              </div>
            </div>
          </header>

          {/* Area Konten Utama */}
          <div className="flex-grow max-w-4xl mx-auto w-full p-4 print:p-0">

            {/* PANEL PENGATURAN GLOBAL */}
            <div className="no-print bg-white rounded-2xl shadow-sm border border-slate-200 mb-4 overflow-hidden transition-all duration-300">
              <div 
                onClick={() => setShowSettings(!showSettings)} 
                className="flex justify-between items-center p-4 cursor-pointer hover:bg-slate-50 transition-colors select-none"
              >
                <h4 className="text-xs font-black text-slate-700 uppercase tracking-wider flex items-center gap-1.5">
                  <svg className="w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                  Pengaturan Identitas Dokumen
                </h4>
                <div className="flex items-center gap-2">
                  <span className="text-[10px] font-bold px-2 py-0.5 bg-slate-100 rounded text-slate-500">
                    {showSettings ? 'Aktif' : 'Tersembunyi'}
                  </span>
                  <button className="text-xs font-bold text-indigo-600 hover:text-indigo-800 focus:outline-none">
                    {showSettings ? 'Sembunyikan ✕' : 'Ubah Detail ⚙️'}
                  </button>
                </div>
              </div>
              
              {showSettings && (
                <div className="p-4 pt-0 border-t border-slate-100 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2.5 animate-fadeIn">
                  <div>
                    <label className="block text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Semester</label>
                    <input type="text" value={globalSemester} onChange={(e) => { setGlobalSemester(e.target.value); updateGlobalSettingInCloud('semester', e.target.value); }} className="w-full px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-semibold focus:ring-1 focus:ring-slate-500 focus:outline-none"/>
                  </div>
                  <div>
                    <label className="block text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Tanggal Rapor</label>
                    <input type="text" value={globalTanggal} onChange={(e) => { setGlobalTanggal(e.target.value); updateGlobalSettingInCloud('tanggal', e.target.value); }} className="w-full px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-semibold focus:ring-1 focus:ring-slate-500 focus:outline-none"/>
                  </div>
                  <div>
                    <label className="block text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Wali Kelas</label>
                    <input type="text" value={globalWaliKelas} onChange={(e) => { setGlobalWaliKelas(e.target.value); updateGlobalSettingInCloud('waliKelas', e.target.value); }} className="w-full px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-semibold focus:ring-1 focus:ring-slate-500 focus:outline-none"/>
                  </div>
                  <div>
                    <label className="block text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Jabatan TTD</label>
                    <input type="text" value={globalJabatanKS} onChange={(e) => { setGlobalJabatanKS(e.target.value); updateGlobalSettingInCloud('jabatanKS', e.target.value); }} className="w-full px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-semibold focus:ring-1 focus:ring-slate-500 focus:outline-none"/>
                  </div>
                  <div>
                    <label className="block text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Nama TTD (KS)</label>
                    <input type="text" value={globalNamaKS} onChange={(e) => { setGlobalNamaKS(e.target.value); updateGlobalSettingInCloud('namaKS', e.target.value); }} className="w-full px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-semibold focus:ring-1 focus:ring-slate-500 focus:outline-none"/>
                  </div>
                </div>
              )}
            </div>

                    <input type="number" value={editingStudent.tahfizh_juz} onChange={(e) => setEditingStudent({...editingStudent, tahfizh_juz: Number(e.target.value)})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-teal-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>
                  <div>
                    <label className="block text-xs font-bold mb-1 text-slate-600">Detail Surat / Juz</label>
                    <input type="text" value={editingStudent.tahfizh_detail} onChange={(e) => setEditingStudent({...editingStudent, tahfizh_detail: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Contoh: Lancar Juz 30 & 29"/>
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold mb-1 text-slate-600">Hasil Analisis Psikotes</label>
                    <input type="text" value={editingStudent.psikotes} onChange={(e) => setEditingStudent({...editingStudent, psikotes: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Progress 1 Tahun */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Progress 1 Tahun</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, progres_1s: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg px-2 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.progres_1s.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <input type="text" value={editingStudent.progres_1s} onChange={(e) => setEditingStudent({...editingStudent, progres_1s: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  <div>
                    <label className="block text-xs font-bold mb-1 text-slate-600">Mata Pelajaran Unggul</label>
                    <input type="text" value={editingStudent.mapel_unggul} onChange={(e) => setEditingStudent({...editingStudent, mapel_unggul: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>
                  <div>
                    <label className="block text-xs font-bold mb-1 text-slate-600">Perlu Peningkatan</label>
                    <input type="text" value={editingStudent.mapel_perlu} onChange={(e) => setEditingStudent({...editingStudent, mapel_perlu: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Observasi Ibadah Harian */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Observasi Ibadah Harian</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, ibadah: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-[#00aeef]/10 hover:bg-[#00aeef]/20 border border-indigo-100 rounded-lg px-2 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.ibadah.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.ibadah} onChange={(e) => setEditingStudent({...editingStudent, ibadah: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Sikap dan Disiplin */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Sikap dan Disiplin</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, disiplin: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg px-2 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.disiplin.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.disiplin} onChange={(e) => setEditingStudent({...editingStudent, disiplin: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Sosial & Kepemimpinan */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Sosial & Kepemimpinan</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, sosial: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg px-2 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.sosial.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.sosial} onChange={(e) => setEditingStudent({...editingStudent, sosial: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Prestasi Non-Akademik */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Prestasi Non-Akademik</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, prestasi: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-[#00aeef]/10 border border-[#00aeef]/30 rounded-lg px-2.5 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.prestasi.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <input type="text" value={editingStudent.prestasi} onChange={(e) => setEditingStudent({...editingStudent, prestasi: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Fokus Peningkatan & Target Target Tahun Selanjutnya */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Fokus Peningkatan & Target Tahun Selanjutnya</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, fokus: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg px-2 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.fokus.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.fokus} onChange={(e) => setEditingStudent({...editingStudent, fokus: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>

                  {/* Pesan Wali Kelas & Wali Kamar */}
                  <div className="col-span-2">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5 mb-1.5">
                      <label className="block text-xs font-bold text-slate-600">Pesan Wali Kelas & Wali Kamar</label>
                      <select 
                        onChange={(e) => {
                          if (e.target.value) {
                            setEditingStudent({...editingStudent, pesan_wali: e.target.value});
                            e.target.value = "";
                          }
                        }}
                        className="text-[10px] text-indigo-700 bg-indigo-50 hover:bg-[#00aeef]/10 border border-[#00aeef]/30 rounded-lg px-2.5 py-0.5 outline-none cursor-pointer font-bold"
                      >
                        <option value="">⚡ Pilih Jawaban Cepat...</option>
                        {QUICK_TEMPLATES.pesan_wali.map((opt, idx) => (
                          <option key={idx} value={opt}>Opsi {idx + 1}: {opt.substring(0, 45)}...</option>
                        ))}
                      </select>
                    </div>
                    <textarea value={editingStudent.pesan_wali} onChange={(e) => setEditingStudent({...editingStudent, pesan_wali: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs h-20 resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"/>
                  </div>
                </div>
                
                <div className="flex justify-end gap-2 pt-4 border-t">
                  <button onClick={() => setEditingStudent(null)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                  <button onClick={() => handleSaveStudent(editingStudent)} className="px-5 py-2 text-xs font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-xl shadow transition">Simpan Perubahan</button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL UPLOAD SPREADSHEET / EXCEL / CSV */}
          {showImportModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-6 space-y-4">
                <div className="flex justify-between items-start border-b pb-2">
                  <div>
                    <h3 className="text-sm font-black text-[#2b3990]">📤 Upload Excel</h3>
                    <p className="text-[11px] text-slate-500 mt-0.5">Mendukung unggahan file CSV atau salin & tempel tabel secara langsung dari Excel.</p>
                  </div>
                  <button onClick={getTemplateTSV} className="text-[10px] bg-indigo-50 hover:bg-indigo-100 text-[#2b3990] font-black px-3 py-1.5 rounded-lg transition border border-indigo-100">Ambil Template Teks</button>
                </div>
                
                {/* File Picker */}
                <div className="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:bg-slate-50 transition cursor-pointer relative">
                  <input 
                    type="file" 
                    accept=".csv,.tsv,.txt" 
                    onChange={handleFileUpload} 
                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                  />
                  <span className="text-xs font-bold text-slate-700">📁 Klik untuk memilih File Excel / CSV (.csv)</span>
                  <p className="text-[10px] text-slate-400 mt-1">Atau tempel baris data Excel secara manual pada kolom teks di bawah:</p>
                </div>

                <textarea 
                  placeholder="Tempel baris spreadsheet atau edit isi file CSV di sini..." 
                  value={bulkImportText} 
                  onChange={(e) => setBulkImportText(e.target.value)} 
                  className="w-full h-48 p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-[10px] font-mono resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                />
                
                <div className="flex justify-between items-center pt-4 border-t">
                  <span className="text-[10px] text-slate-400 font-medium">Wajib menggunakan baris tajuk kolom yang sesuai dengan template.</span>
                  <div className="flex gap-1.5">
                    <button onClick={() => setShowImportModal(false)} className="px-4 py-2 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded-xl">Batal</button>
                    <button onClick={handleImportTSV} className="px-4 py-2 text-xs font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-xl shadow transition">Proses & Upload</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* MODAL DIALOG NOTIFIKASI */}
          {alertConfig && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 space-y-4 text-center border">
                <div className="w-12 h-12 rounded-full bg-slate-50 text-[#2b3990] flex items-center justify-center mx-auto text-lg shadow-inner">
                  {alertConfig.type === 'confirm' ? '❓' : '💡'}
                </div>
                <div>
                  <h3 className="text-sm font-extrabold text-slate-900">{alertConfig.title}</h3>
                  <p className="text-xs text-slate-500 mt-2 leading-relaxed">{alertConfig.message}</p>
                </div>
                <div className="flex justify-center gap-1.5 pt-2">
                  {alertConfig.type === 'confirm' && (
                    <button onClick={() => setAlertConfig(null)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs uppercase rounded-xl transition">Batal</button>
                  )}
                  <button onClick={() => { if (alertConfig.type === 'confirm' && alertConfig.onConfirm) alertConfig.onConfirm(); setAlertConfig(null); }} className="px-5 py-2.5 bg-[#2b3990] hover:bg-[#1f2a70] text-white font-bold text-xs uppercase rounded-xl shadow transition">Setuju</button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-slate-900 text-slate-400 py-4 text-center text-xs print:hidden border-t border-slate-800">
            <p>© 2026 MALIKA ISLAMIC BOARDING SCHOOL • Tangerang, Banten</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />); 
  </script>
</body>
</html>
